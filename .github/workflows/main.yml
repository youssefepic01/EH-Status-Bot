name: ABR Bot Update

on:
  schedule:
    - cron: '*/5 * * * *'    # Main timer: every 5 mins
    - cron: '2-59/5 * * * *' # Backup timer: 2 mins after the first
  workflow_dispatch:         # THE MANUAL START BUTTON

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install discord.py requests
      - run: python bot.py
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_MESSAGE_ID: ${{ secrets.DISCORD_MESSAGE_ID }}
